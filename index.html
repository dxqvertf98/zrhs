<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맥락통역사</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="mobile-container">
    <!-- 첫 번째 화면: 로딩 스플래시 -->
    <div id="splash-screen">
        <div class="header-text">
            <img src="img/logotxt.png" alt="맥아리 통역사">
        </div>
        
        <div class="content-area">
            <div class="logo-placeholder">로고</div>
            <div class="loading-text">로딩중...</div>
        </div>

        <div class="loading-area">
            <div class="character-placeholder">🐱</div>
            <div class="loading-bar-container">
                <div class="loading-bar-fill" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- 로딩이 끝난 후 보일 전체 앱 화면 (처음엔 숨김) -->
    <div id="app-screens" style="display: none; height: 100%; flex-direction: column;">
        
        <!-- 공통 상단 헤더 -->
        <header class="main-header">
            <div class="logo-area">
                <span class="site-title" id="go-home" style="cursor:pointer;">
                    <img src="img/logotxt.png" alt="맥아리 통역사">
                </span>
                <!-- 로고가 튀어나오는 문제를 해결하기 위해 숨김 처리 (display: none) -->
                <div class="temp-logo" style="display: none;">로고</div>
            </div>
            <button class="menu-btn" id="menu-btn">
                <span></span><span></span><span></span>
            </button>
        </header>

        <!-- 두 번째 화면: 메인 페이지 -->
        <main class="main-content screen" id="main-screen">
            <textarea class="input-box" placeholder="알림장이나 가정통신문을 복사해주세요."></textarea>

            <div class="language-section">
                <div class="lang-controls">
                    <button class="arrow-btn" id="left-arrow">◀</button>
                    <div class="lang-slider-container" id="lang-container">
                        <div class="lang-slider" id="lang-slider">
                            <button class="lang-btn" data-code="vi">베트남어</button>
                            <button class="lang-btn" data-code="zh">중국어</button>
                            <button class="lang-btn" data-code="en">영어</button>
                            <button class="lang-btn" data-code="ja">일본어</button>
                            <button class="lang-btn" data-code="mn">몽골어</button>
                        </div>
                    </div>
                    <button class="arrow-btn" id="right-arrow">▶</button>
                    <button class="circle-btn" id="translate-btn" title="번역 실행">&gt;</button>
                </div>
                <div class="scroll-indicator-bg">
                    <div class="scroll-indicator-bar" id="scroll-bar"></div>
                </div>
            </div>

            <div class="output-box">
                조금만 기다리시면 안내 사항이 나올 거예요!
            </div>
        </main>

        <!-- 세 번째 화면: 학교 용어 사전 -->
        <main class="main-content screen" id="dictionary-screen" style="display: none;">
            <div class="search-container">
                <input type="text" id="dict-search" class="search-input" placeholder="검색">
                <span class="search-icon">🔍</span>
            </div>
            <div id="dict-list" class="dict-list"></div>
            <div class="pagination">
                <button class="page-btn" id="page-prev">&lt;</button>
                <div id="page-numbers" class="page-numbers"></div>
                <button class="page-btn" id="page-next">&gt;</button>
            </div>
        </main>

        <!-- 네 번째 화면: 로그인한 사용자의 이전 대화 -->
        <main class="main-content screen" id="placeholder-screen" style="display: none;">
            <h2 class="history-title" id="placeholder-title">이전 대화 보기</h2>
            <p class="history-status" id="history-status">로그인 후 내가 요청한 번역과 AI 답변을 확인할 수 있어요.</p>
            <div class="history-list" id="history-list"></div>
        </main>

        <!-- [추가된 화면 1] 로그인 선택 화면 -->
        <main class="main-content screen auth-screen" id="login-screen" style="display: none;">
            <h2 class="auth-title">로그인</h2>
            <div class="auth-button-group">
                <button type="button" class="auth-outline-btn nav-link" data-target="id-login-screen">이메일 로그인</button>
            </div>
            <div class="auth-footer">
                <!-- 회원가입 클릭 시 signup-screen으로 이동 -->
                <a href="#" class="auth-link nav-link" data-target="signup-screen">회원가입</a>
            </div>
        </main>

        <!-- [추가된 화면 2] 아이디 로그인 화면 -->
        <main class="main-content screen auth-screen" id="id-login-screen" style="display: none;">
            <h2 class="auth-title">이메일 로그인</h2>
            <form class="auth-form" id="id-login-form">
                <div class="input-group">
                    <label for="login-username">이메일</label>
                    <input id="login-username" name="username" type="text" class="auth-input" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <label for="login-password">비밀번호</label>
                    <input id="login-password" name="password" type="password" class="auth-input" autocomplete="current-password" required>
                </div>
                <button type="submit" class="auth-submit-btn">완료</button>
                <div class="auth-footer">
                    <a href="#" class="auth-link nav-link" data-target="signup-screen">회원가입</a>
                </div>
            </form>
            <p class="auth-message" id="login-message" aria-live="polite"></p>
        </main>

        <!-- [추가된 화면 3] 회원가입 화면 -->
        <main class="main-content screen auth-screen" id="signup-screen" style="display: none;">
            <h2 class="auth-title">회원가입</h2>
            <form class="auth-form" id="signup-form">
                <div class="input-group">
                    <label for="signup-display-name">이름</label>
                    <input id="signup-display-name" name="displayName" type="text" class="auth-input" maxlength="50" autocomplete="name" required>
                </div>
                <div class="input-group">
                    <label for="signup-email">이메일</label>
                    <input id="signup-email" name="email" type="email" class="auth-input" maxlength="254" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <label for="signup-password">비밀번호</label>
                    <input id="signup-password" name="password" type="password" class="auth-input" minlength="10" maxlength="72" autocomplete="new-password" required>
                </div>
                <div class="input-group">
                    <label for="signup-password-confirm">비밀번호 확인</label>
                    <input id="signup-password-confirm" name="passwordConfirm" type="password" class="auth-input" minlength="10" maxlength="72" autocomplete="new-password" required>
                </div>
                <div class="input-group">
                    <label for="signup-language">주 사용 언어</label>
                    <select id="signup-language" name="preferredLanguage" class="auth-input" required>
                        <option value="vi">베트남어</option>
                        <option value="zh">중국어</option>
                        <option value="en">영어</option>
                        <option value="ja">일본어</option>
                        <option value="mn">몽골어</option>
                    </select>
                </div>
                <div class="terms-group">
                    <input id="signup-terms" name="termsAccepted" type="checkbox" required>
                    <label for="signup-terms">서비스 이용약관과 개인정보 처리방침에 동의합니다.</label>
                </div>
                <button type="submit" class="auth-submit-btn">완료</button>
            </form>
            <p class="auth-message" id="signup-message" aria-live="polite"></p>
        </main>

        <!-- 슬라이드 메뉴 -->
        <div class="side-menu" id="side-menu">
            <div class="menu-content">
                <!-- 맥락 번역 서비스 클릭 시 메인 화면(main-screen)으로 이동하게 수정 -->
                <a href="#" class="menu-item nav-link" data-target="main-screen">맥락 번역 서비스</a>
                <a href="#" class="menu-item nav-link" data-target="placeholder-screen" data-title="이전 대화 보기">이전 대화 보기</a>
                <a href="#" class="menu-item nav-link" data-target="dictionary-screen">학교 용어 사전</a>
                
                <div class="auth-area">
                    <!-- nav-link와 data-target 추가하여 클릭 시 화면 이동 -->
                    <p class="signed-in-user" id="signed-in-user" hidden></p>
                    <button class="login-btn nav-link" id="menu-login-btn" data-target="login-screen">로그인</button>
                    <a href="#" class="signup-link nav-link" id="menu-signup-link" data-target="signup-screen">회원가입</a>
                    <button type="button" class="signup-link logout-btn" id="logout-btn" hidden>로그아웃</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 용어 설명 팝업: 번역 결과에서 헷갈리는 단어를 탭했을 때 뜸 -->
    <div class="glossary-popover" id="glossary-popover" hidden>
        <button type="button" class="popover-close" id="popover-close">✕</button>
        <div class="popover-title" id="popover-title"></div>
        <div class="popover-body" id="popover-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<script src="js/config.js"></script>
<script src="js/script.js"></script>

</body>
</html>
